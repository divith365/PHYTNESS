<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Dashboard - Phytness</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #F59E0B; --primary-dark: #D97706; --accent: #2DD4BF;
      --bg: #ffffff; --text: #1E293B;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #e0f7f7 0%, #d0e8e8 100%);
      color: var(--text); min-height: 100vh;
    }
    .navbar {
      background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px);
      padding: 16px 32px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 50;
    }
    .nav-brand { font-family: 'Outfit', sans-serif; font-weight: 700; color: var(--primary); font-size: 1.5rem; display: flex; align-items: center; gap: 12px; }
    .btn-logout { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 8px 20px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; }
    .btn-logout:hover { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(45, 212, 191, 0.4); }
    
    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
    .header h1 { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 2.2rem; }
    
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245, 158, 11, 0.5); }
    
    .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { background: transparent; color: #888; border: none; padding: 10px 20px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: 0.3s; position: relative; white-space: nowrap; }
    .tab.active { color: var(--primary); }
    .tab.active::after { content: ''; position: absolute; bottom: -11px; left: 0; width: 100%; height: 2px; background: var(--primary); border-radius: 2px; box-shadow: 0 -2px 10px rgba(245, 158, 11, 0.8); }
    .tab:hover:not(.active) { color: #1E293B; }

    .tab-content { display: none; animation: fadeIn 0.4s ease forwards; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .card {
      background: var(--glass-bg); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px;
      margin-bottom: 24px;
    }
    
    table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 8px; }
    th { padding: 14px 20px; text-align: left; color: #888; font-weight: 500; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
    td { padding: 16px 20px; background: rgba(255,255,255,0.6); font-size: 0.95rem; }
    tr td:first-child { border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
    tr td:last-child { border-top-right-radius: 10px; border-bottom-right-radius: 10px; }
    tr:hover td { background: rgba(255,255,255,0.9); }

    .tag { display: inline-block; background: rgba(45, 212, 191, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 100px; font-size: 0.75rem; font-weight: 600; border: 1px solid rgba(45, 212, 191, 0.2); }
    
    /* Modals */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 32px; width: 90%; max-width: 600px;
      max-height: 90vh; overflow-y: auto; color: var(--text);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-header h2 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; color: var(--text); }
    .close-btn { background: rgba(0,0,0,0.05); border: none; color: #888; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
    .close-btn:hover { background: rgba(0,0,0,0.1); color: #333; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 6px; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; background: #f8fafc; border: 1px solid #cbd5e1;
      padding: 12px; border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
    
    .btn-submit { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 1rem; }
    
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Toast Container */
    #toastContainer {
      position: fixed; bottom: 20px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column; gap: 10px;
    }
    .toast {
      min-width: 280px; max-width: 350px; background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px); border-radius: 12px;
      padding: 16px 20px; color: var(--text);
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border-left: 4px solid var(--primary);
      animation: slideInRight 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    .toast.success { border-color: #10B981; }
    .toast.error { border-color: #EF4444; }
    .toast.fade-out { animation: fadeOutRight 0.4s ease forwards; }
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeOutRight {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }

    @media (max-width: 768px) {
      .two-col { grid-template-columns: 1fr; }
      th { display: none; }
      td { display: block; width: 100%; text-align: right; padding: 10px 16px; }
      td::before { content: attr(data-label); float: left; color: #888; font-weight: 500; font-size: 0.8rem; text-transform: uppercase; }
      tr td:first-child { border-radius: 10px 10px 0 0; }
      tr td:last-child { border-radius: 0 0 10px 10px; }
      tr { display: block; margin-bottom: 16px; background: rgba(255,255,255,0.02); border-radius: 10px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <img src="logo_transparent.png" alt="Phytness Logo" style="height: 130px; width: auto; margin: -40px 0; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));">
      <span style="color:#1E293B; font-weight:400; font-size: 1rem; margin-left: 8px;">Staff Portal <span id="hospNameHeader" style="font-weight:600; color:var(--primary);"></span></span>
    </div>
    <div style="display: flex; gap: 15px;">
      <button class="btn-logout" style="background:#f8fafc; color:#1E293B; border:1px solid #cbd5e1; box-shadow: none;" onclick="openModal('changePinModal')">Change PIN</button>
      <button class="btn-logout" onclick="window.location.href='index.html'">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="header">
      <h1>Welcome, <span id="staffNameDisplay" style="color: var(--primary);">Staff Member</span></h1>
      <button class="btn-primary" onclick="openModal('addPatientModal')">+ Register Patient</button>
    </div>

    <div class="tabs" style="display: flex; align-items: center; gap: 10px;">
      <button class="tab active" onclick="switchTab('allPatients', this)">Patient Directory</button>
      <button class="tab" onclick="switchTab('staffDirectory', this)">Staff Directory</button>
      <button class="tab" onclick="switchTab('doctorDirectory', this)">Doctors Directory</button>
      <button class="tab" onclick="switchTab('appointments', this)">Appointments / Stats</button>
      <button class="icon-btn" onclick="refreshCurrentTab()" style="background: none; border: none; font-size: 1.2rem; cursor: pointer; margin-left: auto;" title="Refresh">↻</button>
    </div>

    <!-- All Patients -->
    <div id="allPatients" class="tab-content active">
      <div class="card">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
          <button id="btnDeleteSelected" class="btn-primary" style="background: #ef4444; display: none;" onclick="deleteSelectedPatients()">Delete Selected</button>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width: 40px;"><input type="checkbox" id="selectAllPatients" onclick="toggleAllCheckboxes(this)"></th>
              <th>Patient Info</th>
              <th>Assigned Doctor</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="patientListBody">
            <!-- Data will be populated by API -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Appointments -->
    <div id="appointments" class="tab-content">
      <div class="card">
        <h3 style="margin-bottom: 10px; font-family: 'Outfit';">Hospital Statistics</h3>
        <p style="color: #888;">Staff can view overall patient load across all doctors here.</p>
        <div style="margin-top: 20px; display: flex; gap: 20px;">
           <div style="background: rgba(255,255,255,0.6); padding: 20px; border-radius: 10px; flex:1; text-align: center; border: 1px solid var(--glass-border);">
              <h2 style="color: var(--primary); font-size: 2.5rem; margin-bottom: 5px;">24</h2>
              <p>Active Patients</p>
           </div>
           <div style="background: rgba(255,255,255,0.6); padding: 20px; border-radius: 10px; flex:1; text-align: center; border: 1px solid var(--glass-border);">
              <h2 style="color: var(--accent); font-size: 2.5rem; margin-bottom: 5px;">4</h2>
              <p>Therapists</p>
           </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Add Patient Modal -->
  <div class="modal-overlay" id="addPatientModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Register New Patient</h2>
        <button class="close-btn" onclick="closeModal('addPatientModal')">×</button>
      </div>
      <form id="addPatientForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="patName" required>
        </div>
        <div class="two-col">
          <div class="form-group">
            <label>Age</label>
            <input type="number" id="patAge" min="1" max="120" oninput="if(this.value.length > 3) this.value = this.value.slice(0,3); if(this.value > 120) this.value = 120;" required>
          </div>
          <div class="form-group">
            <label>Gender</label>
            <select id="patGender">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </div>
        <div class="two-col">
          <div class="form-group">
            <label>Phone Number (10 digits)</label>
            <input type="tel" id="patPhone" pattern="[6-9][0-9]{9}" title="Must be a valid 10-digit mobile number starting with 6, 7, 8, or 9" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)" required>
          </div>
          <div class="form-group">
            <label>Assign to Doctor</label>
            <select id="patDoctor">
              <option value="">-- Unassigned --</option>
              <!-- Will be populated dynamically -->
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Chief Complaint</label>
          <textarea id="patComplaint" rows="2"></textarea>
        </div>
        <button type="submit" class="btn-submit">Register Patient</button>
      </form>
    </div>
  </div>

  <!-- Edit Patient Modal -->
  <div id="editPatientModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Patient</h2>
        <button class="close-btn" onclick="closeModal('editPatientModal')">×</button>
      </div>
      <form id="editPatientForm">
        <input type="hidden" id="editPatId">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="editPatName" required>
        </div>
        <div class="two-col">
          <div class="form-group">
            <label>Age</label>
            <input type="number" id="editPatAge" min="1" max="120" oninput="if(this.value.length > 3) this.value = this.value.slice(0,3); if(this.value > 120) this.value = 120;" required>
          </div>
          <div class="form-group">
            <label>Gender</label>
            <select id="editPatGender" required>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="two-col">
          <div class="form-group">
            <label>Phone Number (10 digits)</label>
            <input type="tel" id="editPatPhone" pattern="[6-9][0-9]{9}" title="Must be a valid 10-digit mobile number starting with 6, 7, 8, or 9" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)" required>
          </div>
          <div class="form-group">
            <label>Assign to Doctor</label>
            <select id="editPatDoctor">
              <option value="">-- Unassigned --</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Chief Complaint</label>
          <textarea id="editPatComplaint" rows="2"></textarea>
        </div>
        <button type="submit" class="btn-submit">Save Changes</button>
      </form>
    </div>
  </div>

  <!-- Change PIN Modal -->
  <div id="changePinModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h2>Change Your PIN</h2>
        <button class="close-btn" onclick="closeModal('changePinModal')">×</button>
      </div>
      <form id="changePinForm">
        <div class="form-group">
          <label>Current PIN</label>
          <input type="password" id="cpOldPin" maxlength="4" required>
        </div>
        <div class="form-group">
          <label>New PIN (4 digits)</label>
          <input type="password" id="cpNewPin" pattern="[0-9]{4}" title="Must be exactly 4 digits" maxlength="4" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4)" required>
        </div>
        <div class="form-group">
          <label>Confirm New PIN</label>
          <input type="password" id="cpConfirmPin" pattern="[0-9]{4}" title="Must be exactly 4 digits" maxlength="4" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4)" required>
        </div>
        <button type="submit" class="btn-submit">Update PIN</button>
      </form>
    </div>
  </div>

  <div id="toastContainer"></div>
  <script>
    // Load Hospital Name & ID
    const hName = sessionStorage.getItem('hospitalName');
    const hospId = sessionStorage.getItem('hospitalId');
    if (hName) document.getElementById('hospNameHeader').innerText = `- ${hName}`;

    // Fetch and render patients
    let allPatientsData = [];
    async function loadPatients() {
      if (!hospId) return;
      try {
        const res = await fetch(`/api/list_patients?hospital_id=${hospId}`);
        const patients = await res.json();
        const tbody = document.getElementById('patientListBody');
        tbody.innerHTML = '';
        allPatientsData = patients;
        if (res.ok && Array.isArray(patients)) {
          patients.forEach(p => {
            const docName = p.doctors ? (p.doctors.full_name.startsWith('Dr.') ? p.doctors.full_name : 'Dr. ' + p.doctors.full_name) : 'Unassigned';
            const statusTag = p.treatment_status === 'completed' ? '<span class="tag" style="background:#10B981; color:white;">Completed</span>' : '<span class="tag">Ongoing</span>';
            tbody.innerHTML += `
            <tr>
              <td><input type="checkbox" class="patient-checkbox" value="${p.id}" onclick="updateDeleteBtn()"></td>
              <td data-label="Patient Info"><strong>${p.full_name}</strong><br><span style="font-size:0.8rem; color:#888;">${p.pt_id || ''} • +91-${p.phone}</span></td>
              <td data-label="Assigned Doctor">${docName}</td>
              <td data-label="Status">${statusTag}</td>
              <td data-label="Actions">
                <a href="#" style="color:var(--primary); text-decoration:none; margin-right: 10px;" onclick="openEditPatient('${p.id}')">Edit</a>
              </td>
            </tr>`;
          });
        }
        updateDeleteBtn();
        const selectAll = document.getElementById('selectAllPatients');
        if(selectAll) selectAll.checked = false;
      } catch (err) {
        console.error("Failed to load patients:", err);
      }
    }
    loadPatients();

    // Fetch and populate doctors for this center
    async function loadDoctors() {
      if (!hospId) return;
      try {
        const res = await fetch(`/api/list_doctors?hospital_id=${hospId}`);
        const doctors = await res.json();
        if (res.ok && Array.isArray(doctors)) {
          const select = document.getElementById('patDoctor');
          const editSelect = document.getElementById('editPatDoctor');
          select.innerHTML = '<option value="">-- Unassigned --</option>'; // clear loading state
          editSelect.innerHTML = '<option value="">-- Unassigned --</option>';
          const tbody = document.getElementById('doctorListBody');
          tbody.innerHTML = '';
          doctors.forEach(doc => {
            const docName = doc.full_name.startsWith('Dr.') ? doc.full_name : 'Dr. ' + doc.full_name;
            select.innerHTML += `<option value="${doc.id}">${docName}</option>`;
            editSelect.innerHTML += `<option value="${doc.id}">${docName}</option>`;
            tbody.innerHTML += `<tr><td>${doc.login_id}</td><td>${docName}</td><td>+91-${doc.phone}</td><td>${doc.qualification || 'N/A'}</td></tr>`;
          });
        }
      } catch (err) {
        console.error("Failed to load doctors:", err);
      }
    }
    loadDoctors();

    async function loadStaff() {
      if (!hospId) return;
      try {
        const res = await fetch(`/api/list_staff?hospital_id=${hospId}`);
        const staff = await res.json();
        if (res.ok && Array.isArray(staff)) {
          const tbody = document.getElementById('staffListBody');
          tbody.innerHTML = '';
          staff.forEach(s => {
            tbody.innerHTML += `<tr><td>${s.login_id}</td><td>${s.full_name}</td><td>+91-${s.phone}</td></tr>`;
          });
        }
      } catch(err) {}
    }
    loadStaff();

    function refreshCurrentTab() {
      const activeTab = document.querySelector('.tab-content.active').id;
      if (activeTab === 'allPatients') loadPatients();
      else if (activeTab === 'doctorDirectory') loadDoctors();
      else if (activeTab === 'staffDirectory') loadStaff();
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const icon = type === 'success' ? '✅' : '❌';
      toast.innerHTML = `<span style="font-size: 1.2rem;">${icon}</span> <div>${message}</div>`;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    document.getElementById('addPatientForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        hospital_id: hospId,
        full_name: document.getElementById('patName').value,
        age: parseInt(document.getElementById('patAge').value),
        gender: document.getElementById('patGender').value,
        phone: document.getElementById('patPhone').value,
        chief_complaint: document.getElementById('patComplaint').value,
        assigned_doctor_id: document.getElementById('patDoctor').value || null
      };

      try {
        const res = await fetch('/api/add_patient', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (!res.ok) {
          const err = await res.json();
          showToast(err.error || "Failed to register patient", "error");
          return;
        }

        showToast("Patient registered successfully!", "success");
        closeModal('addPatientModal');
        e.target.reset();
        loadPatients(); // Refresh the table
      } catch (err) {
        showToast("Error connecting to server", "error");
      }
    });

    document.getElementById('changePinForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPin = document.getElementById('cpNewPin').value;
      if (newPin !== document.getElementById('cpConfirmPin').value) {
        showToast("New PINs do not match", "error");
        return;
      }

      const payload = {
        target_role: 'Staff',
        target_phone: sessionStorage.getItem('loginId'),
        old_pin: document.getElementById('cpOldPin').value,
        new_pin: newPin,
        is_admin_override: false
      };

      try {
        const res = await fetch('/api/change_pin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (!res.ok) {
          const err = await res.json();
          showToast(err.error || "Failed to change PIN", "error");
          return;
        }

        showToast("PIN changed successfully!", "success");
        closeModal('changePinModal');
        e.target.reset();
      } catch (err) {
        showToast("Error connecting to server", "error");
      }
    });

    // Bulk Delete Logic
    function toggleAllCheckboxes(source) {
      document.querySelectorAll('.patient-checkbox').forEach(cb => cb.checked = source.checked);
      updateDeleteBtn();
    }
    function updateDeleteBtn() {
      const anyChecked = Array.from(document.querySelectorAll('.patient-checkbox')).some(cb => cb.checked);
      document.getElementById('btnDeleteSelected').style.display = anyChecked ? 'block' : 'none';
    }
    async function deleteSelectedPatients() {
      if (!confirm("Are you sure you want to delete the selected patients?")) return;
      const selected = Array.from(document.querySelectorAll('.patient-checkbox')).filter(cb => cb.checked).map(cb => cb.value);
      if(selected.length === 0) return;
      
      try {
        const res = await fetch('/api/delete_patients', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ patient_ids: selected })
        });
        if(res.ok) {
          showToast(`Deleted ${selected.length} patients successfully.`, "success");
          loadPatients();
        } else {
          const err = await res.json();
          showToast(err.error || "Failed to delete patients", "error");
        }
      } catch(e) {
        showToast("Error connecting to server", "error");
      }
    }

    // Edit Patient Logic
    function openEditPatient(id) {
      const patient = allPatientsData.find(p => p.id === id);
      if(!patient) return;
      document.getElementById('editPatId').value = patient.id;
      document.getElementById('editPatName').value = patient.full_name;
      document.getElementById('editPatAge').value = patient.age;
      document.getElementById('editPatGender').value = patient.gender;
      document.getElementById('editPatPhone').value = patient.phone;
      document.getElementById('editPatComplaint').value = patient.chief_complaint || '';
      document.getElementById('editPatDoctor').value = patient.assigned_doctor_id || '';
      openModal('editPatientModal');
    }

    document.getElementById('editPatientForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        patient_id: document.getElementById('editPatId').value,
        full_name: document.getElementById('editPatName').value,
        age: parseInt(document.getElementById('editPatAge').value),
        gender: document.getElementById('editPatGender').value,
        phone: document.getElementById('editPatPhone').value,
        chief_complaint: document.getElementById('editPatComplaint').value,
        assigned_doctor_id: document.getElementById('editPatDoctor').value || null
      };

      try {
        const res = await fetch('/api/edit_patient', {
          method: 'POST', // using POST instead of PATCH because edge function routes to onRequestPost
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        if(res.ok) {
          showToast("Patient updated successfully!", "success");
          closeModal('editPatientModal');
          loadPatients();
        } else {
          const err = await res.json();
          showToast(err.error || "Failed to update", "error");
        }
      } catch(e) {
        showToast("Error connecting to server", "error");
      }
    });
  </script>
</body>
</html>
