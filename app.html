<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Phytness Portal</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F172A">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --primary: #00A3A0; --primary-dark: #007A78;
      --accent: #F47B20; --admin: #FF5A5F;
      --bg-dark: #FFFFFF; --bg-darker: #F1F5F9;
      --text: #1A2E35;
      --glass-bg: rgba(255, 255, 255, 0.8);
      --glass-border: rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top right, #FFFFFF, #F1F5F9 70%);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow-x: hidden; position: relative;
    }

    .bg-shape { position: absolute; border-radius: 50%; filter: blur(80px); z-index: 0; animation: float 10s infinite ease-in-out alternate; }
    .shape1 { width: 300px; height: 300px; background: rgba(45, 212, 191, 0.15); top: -100px; left: -100px; }
    .shape2 { width: 250px; height: 250px; background: rgba(245, 158, 11, 0.1); bottom: -50px; right: -50px; animation-delay: -5s; }

    @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 50px); } }

    .container { position: relative; z-index: 10; width: 100%; max-width: 440px; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }

    .logo-container { text-align: center; animation: fadeInDown 0.8s ease forwards; margin-bottom: 20px; }
    .logo-container svg { width: 64px; height: 64px; color: var(--primary); filter: drop-shadow(0 4px 10px rgba(45, 212, 191, 0.4)); margin-bottom: 10px; }

    h1 { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 700; margin-bottom: 8px; text-align: center; background: linear-gradient(90deg, #1A2E35, #3D5A62); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p.subtitle { font-size: 0.95rem; color: #64748B; margin-bottom: 40px; text-align: center; }

    #selectionView, #loginView { width: 100%; transition: opacity 0.4s ease, transform 0.4s ease; }
    #loginView { display: none; }

    .roles-grid { display: flex; flex-direction: column; gap: 16px; width: 100%; }

    .role-card {
      background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px;
      display: flex; align-items: center; gap: 16px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      animation: fadeInUp 0.6s ease forwards; opacity: 0; transform: translateY(20px);
    }
    .role-card:nth-child(1) { animation-delay: 0.1s; }
    .role-card:nth-child(2) { animation-delay: 0.2s; }
    .role-card:nth-child(3) { animation-delay: 0.3s; }

    .role-card:hover { background: rgba(0, 0, 0, 0.03); border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0, 163, 160, 0.15); }

    .role-icon { width: 50px; height: 50px; border-radius: 12px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; box-shadow: 0 4px 12px rgba(45, 212, 191, 0.3); }
    
    .role-text h3 { font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 600; margin-bottom: 2px; }
    .role-text p { font-size: 0.8rem; color: #64748B; }
    
    .role-arrow { margin-left: auto; color: var(--primary); font-size: 1.2rem; transition: transform 0.3s ease; }
    .role-card:hover .role-arrow { transform: translateX(4px); }

    .login-box { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 32px 24px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    
    .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #64748B; font-size: 0.85rem; text-decoration: none; margin-bottom: 24px; cursor: pointer; transition: color 0.2s; }
    .back-btn:hover { color: #1A2E35; }

    .login-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--glass-border); }
    .login-header h2 { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 600; }

    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 0.85rem; color: #64748B; margin-bottom: 8px; }
    .input-group input { width: 100%; background: rgba(255,255,255,0.7); border: 1px solid var(--glass-border); padding: 14px 16px; border-radius: 10px; color: #1A2E35; font-family: 'Inter', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    .input-group input:focus { border-color: var(--primary); }

    .submit-btn { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--bg-darker); border: none; padding: 14px; border-radius: 10px; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 1rem; margin-top: 12px; cursor: pointer; transition: transform 0.1s, box-shadow 0.3s; box-shadow: 0 4px 15px rgba(45, 212, 191, 0.3); }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(45, 212, 191, 0.5); }
    .submit-btn:active { transform: scale(0.98); }

    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <div class="container">
    
    <div class="logo-container">
      <img src="logo_transparent.png" alt="Phytness Healthcare Logo" style="height: 280px; width: auto; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1)); margin-bottom: -15px;">
      <h1>PHYTNESS</h1>
      <p class="subtitle">Select your portal to continue</p>
    </div>

    <!-- VIEW 1: Role Selection -->
    <div id="selectionView">
      <div class="roles-grid">
        <div class="role-card" onclick="showLogin('Doctor', '🩺', 'Therapist Login', 'Login ID (e.g., CH-D01)')">
          <div class="role-icon">🩺</div>
          <div class="role-text">
            <h3>Therapist Portal</h3>
            <p>Access patient records & plans</p>
          </div>
          <div class="role-arrow">→</div>
        </div>

        <div class="role-card" onclick="showLogin('Staff', '📋', 'Staff Login', 'Login ID (e.g., CH-S01)')">
          <div class="role-icon" style="background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);">📋</div>
          <div class="role-text">
            <h3>Staff Portal</h3>
            <p>Manage appointments & directory</p>
          </div>
          <div class="role-arrow">→</div>
        </div>

        <div class="role-card" onclick="showLogin('Patient', '👤', 'Patient Login', 'Registered Phone Number')">
          <div class="role-icon" style="background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);">👤</div>
          <div class="role-text">
            <h3>Patient Portal</h3>
            <p>View your rehab progress</p>
          </div>
          <div class="role-arrow">→</div>
        </div>
      </div>
      
      <div style="margin-top: 30px; text-align: center;">
        <span onclick="showLogin('Admin', '⚙️', 'Super Admin Login', 'Admin Phone Number')" style="color: #64748B; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#64748B'">Admin Access</span>
      </div>
    </div>

    <!-- VIEW 2: Login Form -->
    <div id="loginView">
      <div class="login-box">
        <a class="back-btn" onclick="showSelection()">← Back to roles</a>
        
        <div class="login-header">
          <div class="role-icon" id="loginIcon" style="width: 50px; height: 50px; font-size: 1.5rem; border-radius: 12px;">🩺</div>
          <h2 id="loginTitle">Staff Login</h2>
        </div>

        <form id="loginForm">
          <div class="input-group">
            <label id="identifierLabel">Login Identifier</label>
            <input type="text" id="identifierInput" placeholder="Enter ID or Phone" required>
          </div>
          <div class="input-group">
            <label>PIN Code</label>
            <input type="password" id="pinInput" placeholder="Enter your PIN" required>
          </div>
          <button type="submit" class="submit-btn" id="submitBtn">Authenticate</button>
        </form>
      </div>
    </div>

  </div>

  <script>
    let currentRole = '';
    const selectionView = document.getElementById('selectionView');
    const loginView = document.getElementById('loginView');
    const loginTitle = document.getElementById('loginTitle');
    const loginIcon = document.getElementById('loginIcon');
    const identifierLabel = document.getElementById('identifierLabel');
    const identifierInput = document.getElementById('identifierInput');

    window.showLogin = function(role, icon, displayLabel, placeholderText) {
      currentRole = role;
      loginTitle.innerText = displayLabel;
      loginIcon.innerText = icon;
      identifierLabel.innerText = placeholderText;
      identifierInput.placeholder = placeholderText;
      
      if(role === 'Admin') {
        loginIcon.style.background = 'linear-gradient(135deg, var(--admin) 0%, #d9454a 100%)';
      } else if(role === 'Staff') {
        loginIcon.style.background = 'linear-gradient(135deg, var(--accent) 0%, #d97706 100%)';
      } else if (role === 'Patient') {
        loginIcon.style.background = 'linear-gradient(135deg, #6366F1 0%, #4F46E5 100%)';
      } else {
        loginIcon.style.background = 'linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%)';
      }

      selectionView.style.display = 'none';
      loginView.style.display = 'block';
    };

    window.showSelection = function() {
      loginView.style.display = 'none';
      selectionView.style.display = 'block';
    };

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const identifier = document.getElementById('identifierInput').value;
      const pin = document.getElementById('pinInput').value;
      const btn = document.getElementById('submitBtn');
      const originalText = btn.innerText;
      
      btn.innerText = 'Authenticating...';
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ role: currentRole, identifier, pin }) // Note: Sending 'identifier' now
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }
        
        btn.innerText = '✓ Access Granted';
        btn.style.background = '#10B981'; // Success Green
        
        // Redirect based on role
        setTimeout(() => {
          if (currentRole === 'Admin') window.location.href = 'dashboard-admin.html';
          else if (currentRole === 'Doctor') window.location.href = 'dashboard-doctor.html';
          else if (currentRole === 'Staff') window.location.href = 'dashboard-staff.html';
          else window.location.href = 'dashboard-patient.html';
        }, 800);
        
      } catch (err) {
        alert("Login failed: " + err.message);
        btn.innerText = originalText;
      }
    });
  </script>
</body>
</html>
