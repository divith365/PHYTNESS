<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Therapist Dashboard - Phytness</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2DD4BF; --primary-dark: #14B8A6; --accent: #F59E0B;
      --bg: #ffffff; --text: #1E293B;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #e0f7f7 0%, #d0e8e8 100%);
      color: var(--text); min-height: 100vh;
    }
    .navbar {
      background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px);
      padding: 16px 32px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 50;
    }
    .nav-brand { font-family: 'Outfit', sans-serif; font-weight: 700; color: var(--primary); font-size: 1.5rem; display: flex; align-items: center; gap: 12px; }
    .btn-logout { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 8px 20px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; }
    .btn-logout:hover { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); }
    
    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
    .header h1 { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 2.2rem; }
    
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--bg-darker); border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(45, 212, 191, 0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(45, 212, 191, 0.5); }
    
    .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { background: transparent; color: #888; border: none; padding: 10px 20px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: 0.3s; position: relative; white-space: nowrap; }
    .tab.active { color: var(--primary); }
    .tab.active::after { content: ''; position: absolute; bottom: -11px; left: 0; width: 100%; height: 2px; background: var(--primary); border-radius: 2px; box-shadow: 0 -2px 10px rgba(45, 212, 191, 0.8); }
    .tab:hover:not(.active) { color: #1E293B; }

    .tab-content { display: none; animation: fadeIn 0.4s ease forwards; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .card {
      background: var(--glass-bg); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px;
      margin-bottom: 24px;
    }
    
    /* Patient Grid */
    .patient-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .patient-card {
      background: rgba(255,255,255,0.6); border: 1px solid var(--glass-border); border-radius: 12px; padding: 20px;
      transition: transform 0.3s, border-color 0.3s; cursor: pointer;
    }
    .patient-card:hover { transform: translateY(-5px); border-color: var(--primary); background: rgba(255,255,255,0.9); }
    .patient-name { font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 1.2rem; color: var(--text); margin-bottom: 4px; }
    .patient-meta { font-size: 0.85rem; color: #888; margin-bottom: 12px; }
    .tag { display: inline-block; background: rgba(45, 212, 191, 0.1); color: var(--primary); padding: 4px 10px; border-radius: 100px; font-size: 0.75rem; font-weight: 600; border: 1px solid rgba(45, 212, 191, 0.2); }
    
    /* Treatment Sheet */
    .report-sheet { background: #fff; color: #333; border-radius: 8px; padding: 30px; margin-top: 20px; min-height: 400px; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); position: relative; }
    .report-sheet::before { content: ''; position: absolute; left: 40px; top: 0; bottom: 0; width: 2px; background: rgba(255, 90, 95, 0.2); } /* Red line like notebook */
    .report-entry { margin-left: 60px; margin-bottom: 24px; position: relative; border-bottom: 1px solid #eee; padding-bottom: 12px; }
    .report-date { font-weight: 600; color: #666; font-size: 0.85rem; margin-bottom: 8px; display: block; }
    .report-notes { font-family: 'Inter', sans-serif; line-height: 1.6; color: #222; white-space: pre-wrap; }
    .report-textarea { width: calc(100% - 60px); margin-left: 60px; border: 1px dashed #ccc; padding: 12px; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 1rem; outline: none; resize: vertical; min-height: 100px; background: #fafafa; }
    .report-textarea:focus { border-color: var(--primary-dark); background: #fff; }

    /* Modals */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg); border: 1px solid var(--glass-border);
      border-radius: 20px; padding: 32px; width: 90%; max-width: 600px;
      max-height: 90vh; overflow-y: auto; color: var(--text);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-header h2 { font-family: 'Outfit', sans-serif; font-size: 1.5rem; color: var(--text); }
    .close-btn { background: rgba(0,0,0,0.05); border: none; color: #888; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
    .close-btn:hover { background: rgba(0,0,0,0.1); color: #333; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 6px; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; background: #f8fafc; border: 1px solid #cbd5e1;
      padding: 12px; border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
    
    .btn-submit { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--bg-darker); border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 1rem; }
    
    /* Layout for two cols */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Toast Container */
    #toastContainer {
      position: fixed; bottom: 20px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column; gap: 10px;
    }
    .toast {
      min-width: 280px; max-width: 350px; background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px); border-radius: 12px;
      padding: 16px 20px; color: var(--text);
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border-left: 4px solid var(--primary);
      animation: slideInRight 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    .toast.success { border-color: #10B981; }
    .toast.error { border-color: #EF4444; }
    .toast.fade-out { animation: fadeOutRight 0.4s ease forwards; }
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeOutRight {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }

    @media (max-width: 768px) {
      .patient-grid { grid-template-columns: 1fr; }
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <img src="logo_transparent.png" alt="Phytness Logo" style="height: 130px; width: auto; margin: -40px 0; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));">
      <span style="color:#1E293B; font-weight:400; font-size: 1rem; margin-left: 8px;">Doctor Portal <span id="hospNameHeader" style="font-weight:600; color:var(--primary-dark);"></span></span>
    </div>
    <div style="display: flex; gap: 15px;">
      <button class="btn-logout" onclick="window.location.href='index.html'">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="header">
      <h1>Welcome, <span id="doctorNameDisplay" style="color: var(--primary);">Doctor</span></h1>
      <button class="btn-primary" onclick="openModal('addPatientModal')">+ Add Patient</button>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('myPatients', this)">My Patients</button>
      <button class="tab" onclick="switchTab('allPatients', this)">All Centre Patients</button>
      <button class="tab" onclick="switchTab('treatmentView', this)" style="display:none;" id="tabTreatment">Treatment Sheet</button>
    </div>

    <!-- My Patients -->
    <div id="myPatients" class="tab-content active">
      <div class="patient-grid" id="myPatientList">
        <!-- Data will be populated by API -->
      </div>
    </div>

    <!-- All Patients -->
    <div id="allPatients" class="tab-content">
      <div class="patient-grid" id="allPatientList">
        <!-- Data will be populated by API -->
      </div>
    </div>

    <!-- Treatment View (Hidden by default) -->
    <div id="treatmentView" class="tab-content">
      <div class="header" style="margin-bottom: 10px;">
        <h2 id="treatmentPatientName" style="font-family: 'Outfit', sans-serif;">Patient Name</h2>
        <div style="display:flex; gap:10px;">
            <button class="btn-logout" style="border-color: var(--primary); color: var(--primary);" onclick="markCompleted()">Mark Completed</button>
            <button class="btn-primary" onclick="saveTreatment()">Save Notes</button>
        </div>
      </div>
      
      <div class="report-sheet">
        <div id="existingNotes">
          <!-- Logs will be populated here -->
        </div>
        
        <textarea id="newTreatmentNote" class="report-textarea" placeholder="Type new treatment notes here..."></textarea>
      </div>
    </div>

  </div>

  <!-- Add Patient Modal (Fallback for Doctors) -->
  <div class="modal-overlay" id="addPatientModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Register New Patient</h2>
        <button class="close-btn" onclick="closeModal('addPatientModal')">×</button>
      </div>
      <form id="addPatientForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="patName" required>
        </div>
        <div class="two-col">
          <div class="form-group">
            <label>Age</label>
            <input type="number" id="patAge" min="1" max="120" oninput="if(this.value.length > 3) this.value = this.value.slice(0,3); if(this.value > 120) this.value = 120;" required>
          </div>
          <div class="form-group">
            <label>Gender</label>
            <select id="patGender">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Phone Number (10 digits)</label>
          <input type="tel" id="patPhone" pattern="[6-9][0-9]{9}" title="Must be a valid 10-digit mobile number starting with 6, 7, 8, or 9" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)" required>
        </div>
        <div class="form-group">
          <label>Chief Complaint</label>
          <textarea id="patComplaint" rows="2"></textarea>
        </div>
        <button type="submit" class="btn-primary" style="width:100%; margin-top:20px;">Register Patient</button>
      </form>
    </div>
  </div>

  <div id="toastContainer"></div>
  <script>
    // Load Hospital Name
    const hName = sessionStorage.getItem('hospitalName');
    if (hName) document.getElementById('hospNameHeader').innerText = `- ${hName}`;

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const icon = type === 'success' ? '✅' : '❌';
      toast.innerHTML = `<span style="font-size: 1.2rem;">${icon}</span> <div>${message}</div>`;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function openTreatmentSheet(patientId, name) {
      document.getElementById('treatmentPatientName').innerText = name + ' - Treatment Log';
      const tabBtn = document.getElementById('tabTreatment');
      tabBtn.style.display = 'block';
      switchTab('treatmentView', tabBtn);
      
      // In a real implementation, we would fetch existing treatment_logs from API here
      // fetch(`/api/get_treatments?patient_id=${patientId}`)
    }

    async function saveTreatment() {
      const note = document.getElementById('newTreatmentNote').value;
      if (!note.trim()) { showToast('Note is empty!', 'error'); return; }
      
      // Mocking UI update
      const dateStr = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', month: 'long', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      const entryHtml = `
        <div class="report-entry">
          <span class="report-date">${dateStr} (IST) - Treatment Updated</span>
          <div class="report-notes">${note}</div>
        </div>`;
      document.getElementById('existingNotes').insertAdjacentHTML('beforeend', entryHtml);
      document.getElementById('newTreatmentNote').value = '';
      
      showToast('Treatment Log Appended Successfully!', 'success');
      
      // Real API call would happen here via /api/add_treatment
    }

    function markCompleted() {
      showToast("Patient treatment marked as completed! They can return later if needed.", "success");
      // API call to update patient treatment_status to 'completed'
    }

    document.getElementById('addPatientForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const hospId = sessionStorage.getItem('hospitalId');
      const userId = sessionStorage.getItem('userId');
      
      const payload = {
        hospital_id: hospId,
        full_name: document.getElementById('patName').value,
        age: parseInt(document.getElementById('patAge').value),
        gender: document.getElementById('patGender').value,
        phone: document.getElementById('patPhone').value,
        chief_complaint: document.getElementById('patComplaint').value,
        assigned_doctor_id: userId
      };

      try {
        const res = await fetch('/api/add_patient', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (!res.ok) {
          const err = await res.json();
          showToast(err.error || "Failed to register patient", "error");
          return;
        }

        showToast("Patient registered and assigned to you!", "success");
        closeModal('addPatientModal');
        e.target.reset();
      } catch (err) {
        showToast("Error connecting to server", "error");
      }
    });
  </script>
</body>
</html>
